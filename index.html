<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build Something Amazing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero-desktop">
    <section class="hero">
      <!-- Background pattern: ellipses + dot grid -->
      <div class="background-pattern" aria-hidden="true">
        <span class="ellipse e1"></span>
        <span class="ellipse e2"></span>
        <span class="ellipse e3"></span>
        <span class="ellipse e4"></span>
        <span class="ellipse e5"></span>
        <span class="ellipse e6"></span>
        <span class="ellipse e7"></span>
        <div class="dot-grid"></div>
      </div>

      <div class="content">
        <h1 class="headline">Build Something Amazing</h1>
        <div class="subhead">
          <p>A fast, modern platform to help teams ship products with confidence.</p>
          <p>Start for free — no credit card required.</p>
        </div>
        <a href="#" class="button-primary">
          <span class="label">Get Started Free →</span>
        </a>
      </div>

      <div class="image-placeholder-wrap" aria-hidden="true">
       <div class="image-placeholder">
        <div class="window-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <div class="url-bar"></div>
          <div class="tab tab-1"></div>
          <div class="tab tab-2"></div>
        </div>
        <div class="window-body">
          <aside class="sidebar">
            <span class="side-line"></span><span class="side-line"></span>
            <span class="side-line"></span><span class="side-line"></span>
            <span class="side-line"></span><span class="side-line"></span>
            <span class="side-line"></span><span class="side-line"></span>
            <span class="side-line"></span><span class="side-line"></span>
            <span class="side-line"></span>
          </aside>
          <div class="editor">
            <div class="code-row">
              <span class="tok purple w-30"></span>
              <span class="tok blue w-60"></span>
              <span class="tok gray w-16"></span>
              <span class="tok green w-80"></span>
              <span class="tok gray w-10"></span>
            </div>
            <div class="code-row indent-1">
              <span class="tok pink w-40"></span>
              <span class="tok gray w-18"></span>
              <span class="tok orange w-120"></span>
            </div>
            <div class="code-row indent-1">
              <span class="tok pink w-50"></span>
              <span class="tok gray w-18"></span>
              <span class="tok blue w-90"></span>
              <span class="tok gray w-60"></span>
            </div>
            <div class="code-row empty"></div>
            <div class="code-row">
              <span class="tok purple w-70"></span>
              <span class="tok gray w-18"></span>
              <span class="tok yellow w-50"></span>
            </div>
            <div class="code-row indent-1">
              <span class="tok pink w-30"></span>
              <span class="tok gray w-18"></span>
              <span class="tok yellow w-160"></span>
            </div>
            <div class="code-row indent-1">
              <span class="tok pink w-30"></span>
              <span class="tok gray w-18"></span>
              <span class="tok blue w-100"></span>
            </div>
            <div class="code-row indent-1">
              <span class="tok gray w-10"></span>
            </div>
            <div class="code-row empty"></div>
            <div class="code-row">
              <span class="tok blue w-60"></span>
              <span class="tok gray w-200"></span>
            </div>
            <div class="code-row">
              <span class="tok pink w-30"></span>
              <span class="tok blue w-50"></span>
              <span class="tok gray w-18"></span>
            </div>
          </div>
          <div class="panel-divider"></div>
          <div class="side-panel">
            <span class="panel-heading"></span>
            <div class="panel-card">
              <span class="card-title purple"></span>
              <span class="card-sub"></span>
            </div>
            <div class="panel-card">
              <span class="card-title blue"></span>
              <span class="card-sub"></span>
            </div>
            <div class="panel-card">
              <span class="card-title green"></span>
              <span class="card-sub"></span>
            </div>
          </div>
        </div>
        <div class="status-bar">
          <span class="status green-pill"></span>
          <span class="status gray-pill w-60"></span>
          <span class="status gray-pill right-1"></span>
          <span class="status gray-pill right-2"></span>
        </div>
       </div>
      </div>
    </section>
  </div>
</body>
</html>
